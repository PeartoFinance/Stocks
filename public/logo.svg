<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3d977"/>
      <stop offset="50%" stop-color="#7cb342"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cb342"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c5e1a5"/>
      <stop offset="100%" stop-color="#aed581"/>
    </linearGradient>
  </defs>
  <!-- Pear body -->
  <path fill="url(#pearGradient)" stroke="#4a7c23" stroke-width="1.5" d="M32 58c-12 0-18-8-18-20 0-8 4-14 8-18 2-2 4-6 4-10 0-2 2-4 6-4s6 2 6 4c0 4 2 8 4 10 4 4 8 10 8 18 0 12-6 20-18 20z"/>
  <!-- Highlight on pear -->
  <path fill="url(#highlightGradient)" opacity="0.6" d="M24 30c-2 4-3 8-3 12 0 2 0.5 4 1.5 6 1-6 3-10 6-14-2 0-3.5 2-4.5 4z"/>
  <!-- Small leaf/stem circle -->
  <ellipse cx="38" cy="10" rx="5" ry="4" fill="url(#leafGradient)" stroke="#4a7c23" stroke-width="1"/>
  <!-- Stem -->
  <path fill="none" stroke="#4a7c23" stroke-width="2" stroke-linecap="round" d="M32 6 Q34 8 34 12"/>
</svg>